name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read
  id-token: write  # Required for trusted publishing via OIDC

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package contents
        run: |
          echo "=== sdist contents ==="
          tar tzf dist/*.tar.gz | head -50
          echo ""
          echo "=== wheel contents ==="
          unzip -l dist/*.whl | head -50
          echo ""
          echo "=== Checking critical files ==="
          tar tzf dist/*.tar.gz | grep -q "ui/dist/client/index.html" && echo "UI dist: OK" || echo "UI dist: MISSING"
          tar tzf dist/*.tar.gz | grep -q "config/model-presets.json" && echo "Model presets: OK" || echo "Model presets: MISSING"
          tar tzf dist/*.tar.gz | grep -q "evals/math-basics/" && echo "Eval suites: OK" || echo "Eval suites: MISSING"
          tar tzf dist/*.tar.gz | grep -q "workflows/eval_suite.json" && echo "Workflows: OK" || echo "Workflows: MISSING"
          tar tzf dist/*.tar.gz | grep -q "LICENSE" && echo "LICENSE: OK" || echo "LICENSE: MISSING"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/conductor-evals
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/conductor-evals
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
